{# register.html: Registration form for creating a new user account. #}
{% extends 'base.html' %}


{% block head %}
   <title>Skapa konto - UNI:VERSE</title>
   <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">
{% endblock %}

{% block body %}
   <main class="register-page">
       <section id="register" class="register-section">
           <div class="register-shell">
               <div class="register-form-card">
                   <div class="register-form-heading">
                       <h2>Skapa konto</h2>
                   </div>


                   <form class="register-form" method="POST" action="{{ url_for('auth.register') }}">
                       <div class="register-field-grid">
                           <label>
                               <span>Namn</span>
                               <input type="text" name="first_name" autocomplete="given-name" placeholder="Förnamn" required>
                           </label>


                           <label>
                               <span>Efternamn</span>
                               <input type="text" name="last_name" autocomplete="family-name" placeholder="Efternamn" required>
                           </label>


                           <label class="full">
                               <span>E-post</span>
                               <input type="email" name="email" autocomplete="email" placeholder="namn@gmail.com" required>
                           </label>

                           <label class="full">
                               <span>Lösenord</span>
                               <input
                                   type="password"
                                   name="password"
                                   autocomplete="new-password"
                                   minlength="8"
                                   pattern="(?=.*[A-Za-zÅÄÖåäö])(?=.*[0-9]).{8,}"
                                   placeholder="Minst 8 tecken"
                                   required
                               >
                           </label>

                           <label class="compact">
                               <span>Skola</span>
                               <input type="text" name="school" autocomplete="organization" placeholder="Din skola" required>
                           </label>

                           <label class="compact">
                            <span>Telefonnummer</span>
                            <input type="tel" name="phone" autocomplete="tel" placeholder="0701234567" required>
                           </label>

                           <label class="compact">
                               <span>Kön</span>
                               <select name="gender" required>
                                   <option value="" selected disabled>Välj kön</option>
                                   <option value="kille">Kille</option>
                                   <option value="tjej">Tjej</option>
                                   <option value="annat">Annat</option>
                               </select>
                           </label>
                       </div>

                       {% if error %}
                       <p class="form-error">{{ error }}</p>
                       {% endif %}


                       <div class="register-actions">
                           <a href="{{ url_for('auth.login') }}">Har du redan ett konto?</a>
                           <button class="register-submit" type="submit">Skapa konto</button>
                       </div>
                   </form>
               </div>
           </div>
       </section>
   </main>
{% endblock %}
