{% extends 'base.html' %}


{% block head %}
   <title>Chat - UNI:VERSE</title>
   <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">
   <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
{% endblock %}


{% block body %}
   <main class="chat-page">
      <div class = "message-box">
        <h2>{{room}}</h2>
        <div class="messages" id="chat"></div>
        <div class="inputs">
            <input type="text" placeholder="Meddelande..." name= message id = message>
            <button type="button" name="send" id="send-btn" onclick="sendMessage()">Skicka</button>
        </div>
      </div>
   </main>
{% endblock %}
