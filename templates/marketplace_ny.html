{% extends 'base.html' %}

{% block head %}
<title>Ny annons – UNI:VERSE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">
{% endblock %}

{% block body %}
<main class="marketplace-ny-page">
  <div class="marketplace-ny-shell">
    <div class="marketplace-ny-card">
      <div class="marketplace-ny-heading">
        <h1>Lägg upp annons</h1>
        <p>Fyll i uppgifterna nedan för att publicera din annons på marknadsplatsen.</p>
      </div>

      <form class="marketplace-ny-form" method="post" enctype="multipart/form-data" action="{{ url_for('marketplace_ny') }}">

        <div class="bli-field">
          <label for="title">Titel</label>
          <input type="text" id="title" name="title" required placeholder="T.ex. Matteboken MA1C, nästan ny">
        </div>

        <div class="bli-field">
          <label for="description">Beskrivning</label>
          <textarea id="description" name="description" placeholder="Beskriv varan eller tjänsten…"></textarea>
        </div>

        <div class="marketplace-ny-row">
          <div class="bli-field">
            <label for="price">Pris (kr)</label>
            <input type="number" id="price" name="price" min="0" step="1" placeholder="0" required>
          </div>
          <div class="bli-field">
            <label for="listing_type">Typ</label>
            <select id="listing_type" name="listing_type" required>
              <option value="Säljes">Säljes</option>
              <option value="Hyres">Hyres</option>
            </select>
          </div>
        </div>

        <div class="bli-field">
          <label for="category">Kategori</label>
          <select id="category" name="category" required>
            <option value="Böcker">Böcker</option>
            <option value="Möbler">Möbler</option>
            <option value="Elektronik">Elektronik</option>
            <option value="Bostad">Bostad</option>
            <option value="Övrigt">Övrigt</option>
          </select>
        </div>

        <div class="bli-field">
          <label>Bild (valfritt, JPG/PNG)</label>
          <div class="bli-upload-area" id="uploadArea">
            <input class="bli-file-input" type="file" id="image" name="image" accept=".jpg,.jpeg,.png">
            <div class="marketplace-upload-inner" id="uploadInner">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="17 8 12 3 7 8"/>
                <line x1="12" y1="3" x2="12" y2="15"/>
              </svg>
              <p>Klicka eller dra en bild hit</p>
              <span>JPG eller PNG</span>
            </div>
            <img id="imagePreview" src="" alt="Förhandsgranskning" style="display:none; max-height:180px; border-radius:12px; object-fit:cover; width:100%">
          </div>
        </div>

        <button class="search-btn" type="submit" style="width:100%; min-height:50px; font-size:15px;">Publicera annons</button>

      </form>
    </div>
  </div>
</main>

<script>
const fileInput = document.getElementById('image');
const preview = document.getElementById('imagePreview');
const uploadInner = document.getElementById('uploadInner');
if (fileInput) {
    fileInput.addEventListener('change', () => {
        const file = fileInput.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = e => {
                preview.src = e.target.result;
                preview.style.display = 'block';
                uploadInner.style.display = 'none';
            };
            reader.readAsDataURL(file);
        }
    });
}
</script>
{% endblock %}
