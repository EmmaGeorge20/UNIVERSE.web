<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{url_for('static', filename = 'style.css')}}">
    {% block head%}{% endblock %}
</head>

<body>
    <header class="hero">
        <nav>
            <div id="brand">
                <span class="brand-mark"><img src="{{url_for('static', filename = 'Universe.png')}}" alt="Universe logo"></span>
                <span>UNI:VERSE</span>
            </div>
            <div id="nav-links">
                <a href="#">Hem</a>
                <a href="#">Boka handledning</a>
                <a href="#">Om Oss</a>
                <a href="#">Hjälp</a>
            </div>
            <div id="login">
            {% if session.get("user") %}
                <a href="{{ url_for('auth.logout') }}">Logga ut</a>
            {% else %}
                <a href="{{ url_for('auth.login') }}">Logga in</a>
            {% endif %}
            </div>
        </nav>
    </header>
    {% block body%}{% endblock %}
    <footer>
        <p>© 2026 UNI:VERSE</p>
    </footer>
</body>
</html>
